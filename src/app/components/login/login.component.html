<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <svg class="auth-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="auth-brand-name">Grocery List</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    @if (error()) {
      <div class="auth-alert" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        @if (fieldInvalid('email')) {
          <span class="field-error">Enter a valid email</span>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
        @if (fieldInvalid('password')) {
          <span class="field-error">Password is required</span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="isLoading()">
        @if (isLoading()) { Signing in… } @else { Sign in }
      </button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <button type="button" class="btn btn-secondary btn-full" (click)="continueAsGuest()">
      Continue as Guest
    </button>
    <p class="guest-hint">Browse a shared list — no account needed</p>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
