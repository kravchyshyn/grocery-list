<div class="item" [class.item--bought]="item().bought">
  <label class="item-check" [attr.aria-label]="'Mark ' + item().name + ' as ' + (item().bought ? 'not bought' : 'bought')">
    <input type="checkbox" [checked]="item().bought" (change)="toggle()" />
    <span class="checkmark"></span>
  </label>

  <div class="item-body">
    <span class="item-name">{{ item().name }}</span>
    <div class="item-chips">
      @if (item().amount) {
        <span class="chip chip--amount">{{ item().amount }}</span>
      }
      @if (formattedPrice()) {
        <span class="chip chip--price">{{ formattedPrice() }}</span>
      }
    </div>
  </div>

  <div class="item-actions">
    <button class="icon-btn icon-btn--edit" (click)="edit()" title="Edit item" aria-label="Edit item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
    <button class="icon-btn icon-btn--delete" (click)="delete()" title="Delete item" aria-label="Delete item">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/>
        <path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>
</div>
