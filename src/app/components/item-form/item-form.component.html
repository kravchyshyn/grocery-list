<form class="item-form" [formGroup]="form" (ngSubmit)="submit()">
  <h3 class="form-title">{{ editItem() ? 'Edit Item' : 'Add Item' }}</h3>

  <div class="field">
    <label for="name">
      Item name
      <span class="required">*</span>
    </label>
    <input id="name" type="text" formControlName="name" placeholder="e.g. Apples" autocomplete="off" />
    @if (nameInvalid) {
      @if (form.get('name')?.errors?.['required']) {
        <span class="error">Name is required</span>
      }

      @if (form.get('name')?.errors?.['nameEmpty']) {
        <span class="error">Name cannot be empty or spaces only</span>
      }
    }

  </div>

  <div class="fields-row">
    <div class="field">
      <label for="amount">Amount</label>
      <input id="amount" type="text" formControlName="amount" placeholder="e.g. 2kg, 3 pcs" autocomplete="off" />
    </div>

    <div class="field">
      <label for="price">Price</label>
      <div class="price-input-group">
        <select id="currency" formControlName="currency" class="currency-select" aria-label="Currency">
          @for (c of currencies; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
        <input
          id="price"
          type="number"
          formControlName="price"
          placeholder="0.00"
          min="0"
          step="0.01"
          class="price-input" />
      </div>
      @if (priceInvalid) {
        <span class="error">Price must be 0 or more</span>
      }
    </div>
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    <button [disabled]="isloading()" type="submit" class="btn btn-primary">
      {{ editItem() ? 'Save changes' : 'Add to list' }}
    </button>
  </div>
</form>
